<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Document Summary</title>
  <style>
    body {
      margin: 0;
      background: #f3f4f6;
      color: #1f2937;
      font-family: Georgia, "Times New Roman", serif;
    }
    .page {
      max-width: 900px;
      margin: 32px auto;
      background: #fff;
      padding: 40px 48px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      border: 1px solid #e5e7eb;
    }
    h1 {
      margin: 0 0 24px;
      font-size: 32px;
      border-bottom: 2px solid #111827;
      padding-bottom: 12px;
    }
    h2 {
      margin: 24px 0 8px;
      font-size: 18px;
    }
    .value {
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 16px;
    }
    details {
      margin-top: 28px;
      border-top: 1px solid #e5e7eb;
      padding-top: 20px;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      padding: 16px;
      overflow: auto;
      font-size: 13px;
    }
    @media print {
      body { background: white; }
      .page {
        margin: 0;
        max-width: none;
        box-shadow: none;
        border: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Document Summary</h1>
    <p>No summary content available.</p>
    <details>
      <summary>Raw JSON</summary>
      <pre>{}</pre>
    </details>
  </main>
</body>
</html>
