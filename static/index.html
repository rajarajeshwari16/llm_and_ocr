<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Document Review</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      color: #1f2937;
      min-height: 100vh;
    }

    header {
      background: #1e3a5f;
      color: #fff;
      padding: 18px 32px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .container {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 16px;
    }

    /* ── Upload area ── */
    .upload-card {
      background: #fff;
      border: 2px dashed #3b82f6;
      border-radius: 10px;
      padding: 36px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 28px;
    }
    .upload-card:hover { background: #eff6ff; }
    .upload-card input[type="file"] { display: none; }
    .upload-icon { font-size: 40px; margin-bottom: 10px; }
    .upload-card p { color: #6b7280; font-size: 15px; margin-top: 6px; }
    .upload-card label {
      display: inline-block;
      margin-top: 14px;
      background: #1e3a5f;
      color: #fff;
      padding: 10px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    /* ── Language selector ── */
    .lang-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .lang-row label { font-weight: 600; font-size: 14px; }
    .lang-row select {
      padding: 7px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      background: #fff;
    }

    /* ── Table ── */
    .table-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    thead th {
      background: #1e3a5f;
      color: #fff;
      padding: 13px 16px;
      text-align: left;
      font-weight: 600;
    }
    tbody tr { border-bottom: 1px solid #e5e7eb; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f9fafb; }
    td { padding: 12px 16px; vertical-align: middle; }
    .file-name { font-weight: 500; word-break: break-all; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-summary  { background: #dbeafe; color: #1d4ed8; }
    .btn-summary:hover:not(:disabled)  { background: #bfdbfe; }
    .btn-translate { background: #d1fae5; color: #065f46; }
    .btn-translate:hover:not(:disabled) { background: #a7f3d0; }
    .btn-approve  { background: #22c55e; color: #fff; }
    .btn-approve:hover:not(:disabled)  { background: #16a34a; }
    .btn-reject   { background: #ef4444; color: #fff; }
    .btn-reject:hover:not(:disabled)   { background: #dc2626; }

    .action-cell { display: flex; gap: 8px; flex-wrap: wrap; }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .status-pending  { background: #fef3c7; color: #92400e; }
    .status-approved { background: #dcfce7; color: #14532d; }
    .status-rejected { background: #fee2e2; color: #7f1d1d; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: #9ca3af;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 12px;
      width: 100%;
      max-width: 720px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid #e5e7eb;
    }
    .modal-title { font-size: 17px; font-weight: 700; color: #1e3a5f; }
    .modal-close, .modal-maximize {
      background: none; border: none; font-size: 18px;
      cursor: pointer; color: #6b7280; line-height: 1;
      padding: 4px 8px; border-radius: 4px;
    }
    .modal-close:hover, .modal-maximize:hover { background: #f3f4f6; color: #111; }
    .modal-header-actions { display: flex; gap: 4px; align-items: center; }

    .modal.maximized {
      max-width: 100vw;
      max-height: 100vh;
      width: 100vw;
      height: 100vh;
      border-radius: 0;
    }
    .modal-overlay.maximized { padding: 0; }
    .modal.maximized .modal-body {
      flex: 1;
      min-height: 0;
      padding: 0;
      overflow: hidden;
    }
    .modal.maximized .modal-body iframe {
      width: 100%;
      height: 100%;
      min-height: unset;
    }

    .modal-body {
      padding: 24px;
      overflow-y: auto;
      flex: 1;
    }
    .modal-body:has(iframe) {
      padding: 0;
      overflow: hidden;
    }

    /* Summary content sections */
    .summary-section { margin-bottom: 20px; }
    .summary-section h3 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .summary-section p {
      font-size: 15px;
      line-height: 1.65;
      color: #1f2937;
      white-space: pre-wrap;
    }

    .translate-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      background: #1e3a5f;
      color: #fff;
      padding: 11px 22px;
      border-radius: 7px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
    .translate-link:hover { background: #15294a; }

    .modal-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      min-height: 180px;
      color: #6b7280;
    }
    .modal-loading .big-spinner {
      width: 40px; height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #1e3a5f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .error-msg {
      background: #fee2e2;
      color: #7f1d1d;
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 14px;
      line-height: 1.5;
    }

    .modal-footer {
      padding: 14px 24px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: flex-end;
    }
    .btn-close-modal {
      background: #f3f4f6; color: #374151;
      border: 1px solid #d1d5db;
    }
    .btn-close-modal:hover { background: #e5e7eb; }
  </style>
</head>
<body>

<header>Document Review Portal</header>

<div class="container">

  <!-- Upload area -->
  <div class="upload-card" id="dropZone">
    <div class="upload-icon">📂</div>
    <strong>Drag &amp; drop PDF files here</strong>
    <p>or click the button below to browse</p>
    <label>
      Browse Files
      <input type="file" id="fileInput" accept=".pdf" multiple />
    </label>
  </div>

  <!-- Language -->
  <div class="lang-row">
    <label for="langSelect">Document Language:</label>
    <select id="langSelect">
      <option value="hin">Hindi</option>
      <option value="kan">Kannada</option>
      <option value="tam">Tamil</option>
      <option value="tel">Telugu</option>
      <option value="eng">English</option>
    </select>
  </div>

  <!-- File table -->
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th style="width:40px">#</th>
          <th>File Name</th>
          <th style="width:180px">Actions</th>
          <th style="width:150px">Decision</th>
          <th style="width:110px">Status</th>
        </tr>
      </thead>
      <tbody id="fileTableBody">
        <tr id="emptyRow">
          <td colspan="5">
            <div class="empty-state">
              <div class="icon">📄</div>
              <p>No files uploaded yet. Add PDF files above to get started.</p>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Loading…</span>
      <div class="modal-header-actions">
        <button class="modal-maximize" id="modalMaximize" aria-label="Maximize">⛶</button>
        <button class="modal-close" id="modalCloseTop" aria-label="Close">&times;</button>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-close-modal" id="modalCloseBottom">Close</button>
    </div>
  </div>
</div>

<script>
  // ── State ──
  const files = [];  // { file: File, status: 'pending'|'approved'|'rejected', summaryData: null|object, translateData: null|object }

  // ── DOM refs ──
  const fileInput   = document.getElementById('fileInput');
  const dropZone    = document.getElementById('dropZone');
  const tbody       = document.getElementById('fileTableBody');
  const emptyRow    = document.getElementById('emptyRow');
  const langSelect  = document.getElementById('langSelect');
  const overlay     = document.getElementById('modalOverlay');
  const modalTitle  = document.getElementById('modalTitle');
  const modalBody   = document.getElementById('modalBody');

  // ── File input ──
  fileInput.addEventListener('change', e => addFiles([...e.target.files]));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.background = '#eff6ff'; });
  dropZone.addEventListener('dragleave', () => { dropZone.style.background = ''; });
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.style.background = '';
    const dropped = [...e.dataTransfer.files].filter(f => f.name.toLowerCase().endsWith('.pdf'));
    addFiles(dropped);
  });

  function addFiles(newFiles) {
    newFiles.forEach(f => {
      if (!files.find(x => x.file.name === f.name && x.file.size === f.size)) {
        files.push({ file: f, status: 'pending', summaryData: null, translateData: null });
      }
    });
    renderTable();
    fileInput.value = '';
  }

  // ── Render table ──
  function renderTable() {
    // Remove all rows except emptyRow
    [...tbody.querySelectorAll('tr:not(#emptyRow)')].forEach(r => r.remove());

    if (files.length === 0) {
      emptyRow.style.display = '';
      return;
    }
    emptyRow.style.display = 'none';

    files.forEach((item, idx) => {
      const tr = document.createElement('tr');
      tr.id = `row-${idx}`;
      tr.innerHTML = `
        <td>${idx + 1}</td>
        <td class="file-name">${escHtml(item.file.name)}</td>
        <td>
          <div class="action-cell">
            <button class="btn btn-summary"   onclick="doSummary(${idx})">📋 Summary</button>
            <button class="btn btn-translate" onclick="doTranslate(${idx})">🌐 Translate</button>
          </div>
        </td>
        <td>
          <div class="action-cell">
            <button class="btn btn-approve" onclick="setStatus(${idx},'approved')" ${item.status==='approved'?'disabled':''}>✔ Approve</button>
            <button class="btn btn-reject"  onclick="setStatus(${idx},'rejected')" ${item.status==='rejected'?'disabled':''}>✖ Reject</button>
          </div>
        </td>
        <td><span class="status-badge status-${item.status}">${item.status}</span></td>
      `;
      tbody.appendChild(tr);
    });
  }

  function setStatus(idx, status) {
    files[idx].status = status;
    renderTable();
  }

  // ── Modal helpers ──
  function openModal(title) {
    modalTitle.textContent = title;
    modalBody.innerHTML = `<div class="modal-loading"><div class="big-spinner"></div><p>Processing… this may take a minute.</p></div>`;
    overlay.classList.add('open');
  }

  function showModalContent(html) {
    modalBody.innerHTML = html;
  }

  function closeModal() {
    overlay.classList.remove('open');
  }

  document.getElementById('modalCloseTop').addEventListener('click', closeModal);
  document.getElementById('modalCloseBottom').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  const modalEl = document.querySelector('.modal');
  const maximizeBtn = document.getElementById('modalMaximize');
  maximizeBtn.addEventListener('click', () => {
    const isMax = modalEl.classList.toggle('maximized');
    overlay.classList.toggle('maximized', isMax);
    maximizeBtn.textContent = isMax ? '🗗' : '⛶';
    maximizeBtn.title = isMax ? 'Restore' : 'Maximize';
  });

  // ── Summary ──
  async function doSummary(idx) {
    const item = files[idx];
    openModal(`Summary — ${item.file.name}`);

    // Return cached result immediately if already extracted
    if (item.summaryData) {
      showModalContent(buildSummaryHtml(item.summaryData));
      return;
    }

    const fd = new FormData();
    fd.append('file', item.file);
    fd.append('lang', langSelect.value);

    try {
      const res = await fetch('/summary', { method: 'POST', body: fd });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        showModalContent(`<div class="error-msg">⚠ Error: ${escHtml(err.detail || 'Unknown error')}</div>`);
        return;
      }
      const data = await res.json();
      item.summaryData = data;  // cache it
      showModalContent(buildSummaryHtml(data));
    } catch (e) {
      showModalContent(`<div class="error-msg">⚠ Network error: ${escHtml(e.message)}</div>`);
    }
  }

  function buildSummaryHtml(data) {
    const skip = new Set(['url_summary']);
    let html = '';
    for (const [key, val] of Object.entries(data)) {
      if (skip.has(key)) continue;
      const label = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      const content = (val === null || val === undefined) ? '—' : String(val);
      html += `<div class="summary-section">
        <h3>${escHtml(label)}</h3>
        <p>${escHtml(content)}</p>
      </div>`;
    }
    return html || '<p>No summary content returned.</p>';
  }

  // ── Translate ──
  async function doTranslate(idx) {
    const item = files[idx];
    openModal(`Translation — ${item.file.name}`);

    // Return cached result immediately if already extracted
    if (item.translateData) {
      showModalContent(buildTranslateHtml(item.translateData));
      return;
    }

    const fd = new FormData();
    fd.append('file', item.file);
    fd.append('lang', langSelect.value);

    try {
      const res = await fetch('/translate', { method: 'POST', body: fd });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        showModalContent(`<div class="error-msg">⚠ Error: ${escHtml(err.detail || 'Unknown error')}</div>`);
        return;
      }
      const data = await res.json();
      item.translateData = data;  // cache it
      showModalContent(buildTranslateHtml(data));
    } catch (e) {
      showModalContent(`<div class="error-msg">⚠ Network error: ${escHtml(e.message)}</div>`);
    }
  }

  function buildTranslateHtml(data) {
    return `<iframe src="${escHtml(data.download_url)}#view=FitH" style="width:100%;height:100%;min-height:70vh;border:none;display:block;"></iframe>`;
  }

  // ── Utility ──
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
